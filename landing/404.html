<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Página no encontrada — Ushuaia CRM</title>
  <meta name="theme-color" content="#0F172A" />
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0F172A;
      color: #F1F5F9;
      text-align: center;
      padding: 24px;
    }
    .box { max-width: 400px; }
    h1 { font-size: 4rem; margin: 0; opacity: 0.3; }
    p { color: #94A3B8; line-height: 1.6; }
    a {
      display: inline-block;
      margin-top: 20px;
      padding: 12px 28px;
      background: linear-gradient(135deg, #0EA5E9, #0284C7);
      color: #fff;
      border-radius: 12px;
      text-decoration: none;
      font-weight: 600;
      transition: transform 0.2s;
    }
    a:hover { transform: translateY(-2px); }
  </style>
</head>
<body>
  <div class="box">
    <h1>404</h1>
    <p>La página que buscás no existe.<br>Puede que el enlace haya cambiado o esté mal escrito.</p>
    <a href="./">Volver al inicio</a>
  </div>
</body>
</html>
