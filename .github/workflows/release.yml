name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_notes: ${{ steps.notes.outputs.notes }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get version from tag
        id: version
        shell: bash
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate release notes from commits
        id: notes
        shell: bash
        run: |
          # Find previous tag
          PREV_TAG=$(git tag --sort=-v:refname | head -2 | tail -1)
          if [ "$PREV_TAG" = "$GITHUB_REF_NAME" ]; then
            PREV_TAG=$(git rev-list --max-parents=0 HEAD)
          fi

          NOTES=""
          FEATURES=""
          FIXES=""
          OTHER=""

          while IFS= read -r line; do
            MSG=$(echo "$line" | sed 's/^[a-f0-9]* //')
            case "$MSG" in
              feat:*|feat\(*) FEATURES="${FEATURES}- ${MSG#feat: }
          ";;
              fix:*|fix\(*) FIXES="${FIXES}- ${MSG#fix: }
          ";;
              *) 
                # Skip version bump commits and merge commits
                if [[ ! "$MSG" =~ ^[0-9]+\.[0-9]+ ]] && [[ ! "$MSG" =~ ^Merge ]]; then
                  OTHER="${OTHER}- ${MSG}
          "
                fi
              ;;
            esac
          done <<< "$(git log --oneline ${PREV_TAG}..${GITHUB_REF_NAME})"

          if [ -n "$FEATURES" ]; then
            NOTES="${NOTES}### ✨ Nuevas funcionalidades
          ${FEATURES}
          "
          fi
          if [ -n "$FIXES" ]; then
            NOTES="${NOTES}### 🐛 Correcciones
          ${FIXES}
          "
          fi
          if [ -n "$OTHER" ]; then
            NOTES="${NOTES}### 📦 Otros cambios
          ${OTHER}
          "
          fi

          if [ -z "$NOTES" ]; then
            NOTES="Actualización de mantenimiento."
          fi

          # Write to file for multi-line output
          echo "$NOTES" > release_notes.md
          {
            echo "notes<<NOTES_EOF"
            cat release_notes.md
            echo "NOTES_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always

      - name: Update GitHub Release body
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "$GITHUB_REF_NAME" \
            --notes "$(cat release_notes.md)" \
            --repo na7hk3r/ushuaia-crm
