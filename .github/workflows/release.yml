name: Build & Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build & Publish
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm run dist -- --publish always

  deploy-landing:
    needs: release
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# Changelog" > landing/CHANGELOG.md
          echo "" >> landing/CHANGELOG.md
          echo "Generado automáticamente desde [GitHub Releases](https://github.com/na7hk3r/ushuaia-crm/releases)." >> landing/CHANGELOG.md
          echo "" >> landing/CHANGELOG.md
          gh api repos/na7hk3r/ushuaia-crm/releases --paginate --jq '.[] | "## " + .tag_name + " — " + (.published_at | split("T")[0]) + "\n\n" + (if .body != "" then .body else "Sin notas de versión." end) + "\n"' >> landing/CHANGELOG.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
