name: Deploy Landing Page

on:
  workflow_run:
    workflows: ["Build & Release"]
    types: [completed]

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy-landing:
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Generate CHANGELOG
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "# Changelog" > landing/CHANGELOG.md
          echo "" >> landing/CHANGELOG.md
          echo "Generado automáticamente desde [GitHub Releases](https://github.com/na7hk3r/ushuaia-crm/releases)." >> landing/CHANGELOG.md
          echo "" >> landing/CHANGELOG.md

          # Wait briefly for the release to be fully published
          sleep 10

          gh api repos/na7hk3r/ushuaia-crm/releases --paginate --jq \
            '.[] | "## " + .tag_name + " — " + (.published_at | split("T")[0]) + "\n\n" + (if .body != "" and .body != null then .body else "Sin notas de versión." end) + "\n"' \
            >> landing/CHANGELOG.md

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: landing

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
